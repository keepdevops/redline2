# version: '3.8'

services:
  variosync-web:
    image: keepdevops/variosync1:latest
    build:
      context: .
      dockerfile: Dockerfile.webgui.bytecode
    container_name: variosync-web
    ports:
      - "8080:8080"
    volumes:
      # Persistent data storage for custom APIs and user files
      - variosync-data:/app/data
      - variosync-logs:/app/logs
      - variosync-config:/app/config
    environment:
      - FLASK_ENV=production
      - VARIOSYNC_ENV=production
      - GUNICORN_WORKERS=1
      - GUNICORN_THREADS=4
      # Stripe Configuration (load from .env file or set directly)
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - HOURS_PER_DOLLAR=${HOURS_PER_DOLLAR:-5}
      - PAYMENT_CURRENCY=${PAYMENT_CURRENCY:-usd}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional Redis for enhanced performance (if using Celery)
  redis:
    image: redis:7-alpine
    container_name: variosync-redis
    volumes:
      - redis-data:/data
    restart: unless-stopped
    profiles:
      - full  # Only start with: docker-compose --profile full up

volumes:
  variosync-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data
  variosync-logs:
    driver: local
  variosync-config:
    driver: local
  redis-data:
    driver: local

networks:
  default:
    name: variosync-network
