version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: redline-web
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      # Local uploads directory (production uses S3)
      - ./data/uploads:/app/data/uploads
    environment:
      # Flask
      - HOST=0.0.0.0
      - PORT=8080
      - FLASK_ENV=production
      - DEBUG=false

      # Gunicorn
      - WORKERS=${WORKERS:-4}
      - TIMEOUT=${TIMEOUT:-120}

      # Security
      - SECRET_KEY=${SECRET_KEY}

      # CORS
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}

      # Supabase (loaded from .env)
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - SUPABASE_DB_PASSWORD=${SUPABASE_DB_PASSWORD}

      # Modal
      - MODAL_TOKEN_ID=${MODAL_TOKEN_ID}
      - MODAL_TOKEN_SECRET=${MODAL_TOKEN_SECRET}

      # S3/Wasabi Storage
      - USE_S3_STORAGE=${USE_S3_STORAGE:-true}
      - S3_BUCKET=${S3_BUCKET}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-https://s3.wasabisys.com}

      # Payment
      - ENFORCE_PAYMENT=${ENFORCE_PAYMENT:-true}
      - USAGE_CHECK_INTERVAL=${USAGE_CHECK_INTERVAL:-30}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - HOURS_PER_DOLLAR=${HOURS_PER_DOLLAR:-0.2}
      - PAYMENT_CURRENCY=${PAYMENT_CURRENCY:-usd}

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8080/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    name: redline-network
