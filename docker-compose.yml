# version: '3.8'

services:
  variosync-web:
    image: keepdevops/variosync1:latest
    build:
      context: .
      dockerfile: Dockerfile.webgui.bytecode
    container_name: variosync-web
    ports:
      - "8080:8080"
    environment:
      - FLASK_ENV=production
      - VARIOSYNC_ENV=production
      - GUNICORN_WORKERS=1
      - GUNICORN_THREADS=4
      # Supabase Authentication (JWT) - REQUIRED
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY:-}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET:-}
      # Stripe Subscription Configuration - REQUIRED
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_PRICE_ID_METERED=${STRIPE_PRICE_ID_METERED:-}
      # Cloud Storage (S3/R2) - Default to true for cloud-native deployment
      # For Cloudflare R2: Set S3_ENDPOINT_URL to https://<account-id>.r2.cloudflarestorage.com
      # For AWS S3: Leave S3_ENDPOINT_URL empty or use standard S3 endpoint
      - USE_S3_STORAGE=${USE_S3_STORAGE:-true}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - S3_REGION=${S3_REGION:-auto}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional Redis for enhanced performance (if using Celery)
  redis:
    image: redis:7-alpine
    container_name: variosync-redis
    volumes:
      - redis-data:/data
    restart: unless-stopped
    profiles:
      - full  # Only start with: docker-compose --profile full up

volumes:
  # Redis volume only (used with --profile full)
  redis-data:
    driver: local

networks:
  default:
    name: variosync-network
